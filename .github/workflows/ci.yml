name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs; never cancel main runs
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

# check -> test -> build is serial to save compute minutes
jobs:
  check:
    name: Lint, format, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno task check

  test:
    name: Test suite
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run tests
        run: deno task test:all

  build:
    name: Test cross-compile across targets
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cross-compile
        run: deno task compile:all

      - name: Verify binaries
        run: |
          set -euo pipefail
          for target in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            test -f "bin/rei-${target}" || { echo "Missing bin/rei-${target}"; exit 1; }
          done
          ls -la bin/
