name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + all tags for git-cliff

        # TODO: pin to SHA and write a function to easily update periodically
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # --latest: notes for the most recent tag (the one we just pushed)
          # --strip all: drop header + footer, keep only the changes section
          # --tag: make sure git-cliff scopes to this exact tag even if
          #        something weird happens with tag ordering
          notes=$(git cliff --latest --strip all --tag "$TAG")

          if [ -z "${notes//[[:space:]]/}" ]; then
            echo "::error::git-cliff produced empty release notes for $TAG"
            exit 1
          fi

          # Emit to step output using a random heredoc delimiter
          # (prevents collision if notes ever contain the literal delimiter)
          delimiter="EOF_$(openssl rand -hex 8)"
          {
            echo "notes<<${delimiter}"
            printf '%s\n' "$notes"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

          # Also echo to the job summary for at-a-glance review
          {
            echo "## Release notes for \`$TAG\`"
            echo ""
            printf '%s\n' "$notes"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --verify-tag
