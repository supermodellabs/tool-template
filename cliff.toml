# git-cliff configuration template for Supermodel Labs projects.
#
# We use git-cliff for generating changelog notes
# these are generated by GHA release workflows and written to GitHub release notes
# not output to a CHANGELOG.md
#
# To use:
#   1. Copy this file to `cliff.toml` in your repo root.
#   2. Replace `<REPO_NAME>` at the bottom with this repo's name (e.g. `reishi`).
#   3. Tweak commit_parsers if your project uses additional conventional types.
#
# The owner is always `supermodellabs`.

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for group, commits in commits | group_by(attribute="scope") %}
        #### {{ group | upper_first }}
        {% for commit in commits %}
              * {{ commit.message | split(pat="\n") | first | trim }}\
                {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif %}\
                {% if commit.remote.pr_number %} in #{{ commit.remote.pr_number }}{%- endif %}
        {% endfor %}
    {% endfor %}\
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = true
split_commits = false
# Group ordering uses zero-padded comment prefixes (01–12) so lexical sort
# matches the intended priority order. Keep new groups in the same format.
commit_parsers = [
  { message = "^feat", group = "<!-- 01 -->✨ Features", default_scope = "General" },
  { message = "^fix", group = "<!-- 02 -->🐛 Bug Fixes" },
  { body = ".*security", group = "<!-- 03 -->🛡️ Security" },
  { message = "^perf", group = "<!-- 04 -->🏎️ Performance" },
  { message = "^refactor", group = "<!-- 05 -->♻️ Refactor" },
  { message = "^test", group = "<!-- 06 -->🧪 Testing" },
  { message = "^docs", group = "<!-- 08 -->📚 Documentation", default_scope = "User Docs" },
  { message = "^build", group = "<!-- 09 -->🛠️ Build System" },
  { message = "^ci", group = "<!-- 10 -->🚧 CI/CD", default_scope = "GitHub Actions" },
  { message = "^style", group = "<!-- 11 -->🎨 Style & Formatting" },
  { message = "^chore\\(release\\): update changelog", skip = true },
  { message = "^chore\\(specs\\)", skip = true },
  { message = "^chore", group = "<!-- 12 -->🧰 Tooling & Tasks" },
]
filter_commits = true
fail_on_unmatched_commit = true
topo_order = true
sort_commits = "oldest"

[bump]
breaking_always_bump_major = false
features_always_bump_minor = false

[remote.github]
owner = "supermodellabs"
repo = "<REPO_NAME>"
